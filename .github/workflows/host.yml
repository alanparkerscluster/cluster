name: Windows RDP with Cloudflare
on: workflow_dispatch

jobs:
  build:
    runs-on: windows-latest
    steps:
    - name: Enable Remote Desktop
      run: |
        Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -name "fDenyTSConnections" -Value 0
        Enable-NetFirewallRule -DisplayGroup "Remote Desktop"
        Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -name "UserAuthentication" -Value 1

    - name: Set Password for RDP
      run: |
        $password = ConvertTo-SecureString "YourPassword123!" -AsPlainText -Force
        Set-LocalUser -Name "runneradmin" -Password $password

    - name: Install Python & Roblox Requirements
      run: |
        choco install python --version=3.11.0 -y
        # Refresh env path for python
        $env:Path = [System.Environment]::GetEnvironmentVariable("Path","Machine") + ";" + [System.Environment]::GetEnvironmentVariable("Path","User")
        python -m pip install pyautogui pydirectinput

    - name: Download and Install Cloudflared
      run: |
        # Download the actual binary instead of the website
        Invoke-WebRequest -Uri "https://github.com" -OutFile "cloudflared.msi"
        Start-Process msiexec.exe -Wait -ArgumentList "/i cloudflared.msi /quiet"

    - name: Start Tunnel (No Token Needed)
      shell: cmd
      run: |
        :: Launching with redirection prevents the shell from hanging
        start /b "" "C:\Program Files (x86)\cloudflared\cloudflared.exe" tunnel --url rdp://localhost:3389 > tunnel.log 2>&1
        timeout /t 20 /nobreak > nul

    - name: Extract and Show RDP URL
      shell: powershell
      run: |
        # Wait a moment for the log to populate
        Start-Sleep -Seconds 5
        $log = Get-Content tunnel.log
        $url = $log | Select-String -Pattern "https://[a-zA-Z0-9-]+\.trycloudflare\.com" | ForEach-Object { $_.Matches.Value }
        
        Write-Host "----------------------------------------------------"
        Write-Host "YOUR RDP URL IS: $url"
        Write-Host "----------------------------------------------------"
        Write-Host "To connect locally, run this in your terminal:"
        Write-Host "cloudflared access rdp --hostname $url --url rdp://localhost:3389"
        Write-Host "Then connect your RDP client to: localhost:3389"

    - name: Keep Alive (6 Hours)
      run: |
        $limit = 6 * 60
        for ($i = 0; $i -lt $limit; $i++) {
          Write-Host "Keeping RDP Active... ($($i+1) minutes elapsed)"
          Start-Sleep -Seconds 60
        }
