name: Windows RDP with ngrok
on: workflow_dispatch

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Enable Remote Desktop
        run: |
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -name "fDenyTSConnections" -Value 0
          Enable-NetFirewallRule -DisplayGroup "Remote Desktop"
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -name "UserAuthentication" -Value 1

      - name: Set Password for RDP
        run: |
          $password = ConvertTo-SecureString "YourPassword123!" -AsPlainText -Force
          Set-LocalUser -Name "runneradmin" -Password $password

      - name: Install Python & Roblox Requirements
        run: |
          choco install python --version=3.11.0 -y
          $env:Path = [System.Environment]::GetEnvironmentVariable("Path","Machine") + ";" + [System.Environment]::GetEnvironmentVariable("Path","User")
          python -m pip install pyautogui pydirectinput

      - name: Install ngrok
        run: |
          choco install ngrok -y

      - name: Authenticate & Start ngrok
        shell: cmd
        env:
          NGROK_AUTH_TOKEN: ${{ secrets.NGROK_AUTH_TOKEN }}
        run: |
          ngrok config add-authtoken %NGROK_AUTH_TOKEN%
          start /b ngrok tcp 3389

      - name: Extract RDP Address
        shell: powershell
        run: |
          Start-Sleep -Seconds 10
          $info = curl.exe -s http://localhost:4040/api/tunnels | ConvertFrom-Json
          $address = $info.tunnels[0].public_url
          $address = $address -replace "tcp://", ""
          Write-Host "----------------------------------------------------"
          Write-Host "YOUR RDP ADDRESS IS: $address"
          Write-Host "----------------------------------------------------"
          Write-Host "Connect your RDP client directly to this address."

      - name: Keep Alive (6 Hours)
        run: |
          $limit = 360
          for ($i = 0; $i -lt $limit; $i++) {
              Write-Host "Keeping RDP Active... ($($i+1) minutes elapsed)"
              Start-Sleep -Seconds 60
          }
