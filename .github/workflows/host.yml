name: Windows RDP with Cloudflare
on: workflow_dispatch

jobs:
  build:
    runs-on: windows-latest
    steps:
    - name: Enable Remote Desktop
      run: |
        Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -name "fDenyTSConnections" -Value 0
        Enable-NetFirewallRule -DisplayGroup "Remote Desktop"
        Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -name "UserAuthentication" -Value 1
        
    - name: Set Password for RDP
      run: |
        $password = ConvertTo-SecureString "YourPassword123!" -AsPlainText -Force
        Set-LocalUser -Name "runneradmin" -Password $password

    - name: Install Python & Roblox Requirements
      run: |
        choco install python -y
        python -m pip install pyautogui pydirectinput

    - name: Download and Start Cloudflared
      run: |
        Invoke-WebRequest -Uri "https://github.com" -OutFile "cloudflared.msi"
        Start-Process msiexec.exe -Wait -ArgumentList "/i cloudflared.msi /quiet"
        
    - name: Start Tunnel (No Token Needed)
      shell: cmd
      run: |
        start /b cloudflared tunnel --url rdp://localhost:3389
        timeout /t 20
        type nul > rdp_ready.txt

    - name: Keep Alive (6 Hours)
      run: |
        echo "Check the 'Start Tunnel' logs above for the .trycloudflare.com URL"
        $limit = 6 * 60
        for ($i = 0; $i -lt $limit; $i++) {
          Start-Sleep -Seconds 60
          Write-Host "Keeping RDP Active... ($($i+1) minutes)"
        }
